


<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm - Coza Store</title>
    <link rel="stylesheet" href="product.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="topbar">
            <span>Miễn phí vận chuyển cho đơn từ 1tr VND</span>
        </div>
        <nav class="navbar">
            <div class="logo">WD 110</div>
            <ul class="menu">
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Cửa hàng</a></li>
                <li><a href="#">Thanh toán</a></li>
                <li><a href="#">Bài viết</a></li>
                <li><a href="#">Về tôi</a></li>
                <li><a href="#">Liên hệ</a></li>
            </ul>
            <div class="icons">
                <input type="text" placeholder="Tìm kiếm">
                <span class="cart">🛒 (2)</span>
                <span class="wishlist">🤍 (0)</span>
            </div>
        </nav>
    </header>

    <main class="products">
        <h1>SẢN PHẨM</h1>
        <div class="filters">
            <a href="#" class="active">Tất cả sản phẩm</a>
            <a href="#">Áo</a>
            <a href="#">Quần</a>
            <a href="#">Túi</a>
            <a href="#">Giày</a>
        </div>
        <div class="actions">
            <button>Lọc</button>
            <button>Tìm kiếm</button>
        </div>
        <div class="product-grid">
            <div class="product">
                <img src="https://i.imgur.com/ao1.png" alt="Áo thun thể thao">
                <h3>Áo thun thể thao</h3>
                <p>16.64 VND</p>
            </div>
            <div class="product">
                <img src="https://i.imgur.com/bso1.png" alt="Áo sơ mi công sở">
                <h3>Áo sơ mi công sở</h3>
                <p>35.31 VND</p>
            </div>
            <div class="product">
                <img src="https://i.imgur.com/cso1.png" alt="Sơ mi cộc tay">
                <h3>Sơ mi cộc tay</h3>
                <p>25.50 VND</p>
            </div>
            <div class="product">
                <img src="https://i.imgur.com/da1.png" alt="Áo dạ">
                <h3>Áo dạ</h3>
                <p>75.00 VND</p>
            </div>
        </div>
    </main>
</body>
</html>
